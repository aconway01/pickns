    <style>
        /* Sortable CSS */
        .sortable th {
          cursor: pointer;
        }
        .sortable th.no-sort {
          pointer-events: none;
        }
        .sortable th::after, .sortable th::before {
          transition: color 0.1s ease-in-out;
          font-size: 1.2em;
          color: transparent;
        }
        .sortable th::after {
          margin-left: 3px;
          content: "▸";
        }
        .sortable th:hover::after {
          color: inherit;
        }
        .sortable th.dir-d::after {
          color: inherit;
          content: "▾";
        }
        .sortable th.dir-u::after {
          color: inherit;
          content: "▴";
        }
        .sortable th.indicator-left::after {
          content: "";
        }
        .sortable th.indicator-left::before {
          margin-right: 3px;
          content: "▸";
        }
        .sortable th.indicator-left:hover::before {
          color: inherit;
        }
        .sortable th.indicator-left.dir-d::before {
          color: inherit;
          content: "▾";
        }
        .sortable th.indicator-left.dir-u::before {
          color: inherit;
          content: "▴";
        }
        /* End Sortable CSS */

        /* Spinning loader */
        /* Center the loader */
        #loader {
          position: absolute;
          left: 50%;
          top: 50%;
          z-index: 1;
          width: 120px;
          height: 120px;
          margin: -76px 0 0 -76px;
          border: 16px solid #f3f3f3;
          border-radius: 50%;
          border-top: 16px solid #007bff;
          -webkit-animation: spin 2s linear infinite;
          animation: spin 2s linear infinite;
        }

        @-webkit-keyframes spin {
          0% { -webkit-transform: rotate(0deg); }
          100% { -webkit-transform: rotate(360deg); }
        }

        @keyframes spin {
          0% { transform: rotate(0deg); }
          100% { transform: rotate(360deg); }
        }
        /* End spinning loader */

    <script>
    document.onreadystatechange = function() {
        if (document.readyState !== "complete") {
            document.querySelector("body").style.visibility = "hidden";
            document.querySelector("#loader").style.visibility = "visible";
        } else {
            document.querySelector("#loader").style.display = "none";
            document.querySelector("body").style.visibility = "visible";
        }
    };
